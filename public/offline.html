<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline | Vape Ustad</title>
    <meta name="theme-color" content="#fefefe" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fefefe;
        color: #111;
        font-family: Arial, sans-serif;
      }
      .card {
        width: min(92vw, 440px);
        border: 1px solid #e5e5e5;
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.08);
      }
      .eyebrow {
        color: #a30105;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      h1 {
        margin: 14px 0 8px;
        font-size: 30px;
        line-height: 1.08;
      }
      p {
        color: #555;
        line-height: 1.7;
        margin: 0;
      }
      a {
        margin-top: 22px;
        display: inline-flex;
        border-radius: 16px;
        padding: 12px 18px;
        background: #a30105;
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">Vape Ustad</div>
      <h1>You are offline</h1>
      <p>Please check your internet connection and try again. The app will continue automatically when your connection is back.</p>
      <a href="/">Retry</a>
    </main>
  </body>
</html>
